services:
  # NestJS Swagger Backend
  - type: web
    name: admin-nestjs-backend
    env: node
    region: frankfurt
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run start:prod
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        sync: false
    
  # Express Backend (Admin API)
  - type: web
    name: admin-express-backend
    env: node
    region: frankfurt
    plan: free
    rootDir: Admin/backend
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
