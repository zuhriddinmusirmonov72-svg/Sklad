# Netlify Configuration for Admin Panel (React + Vite)

[build]
  base = "Admin"
  publish = "dist"
  command = "npm install && npm run build"

# Node.js version
[build.environment]
  NODE_VERSION = "20"

# Redirects for SPA (React Router) — MUHIM! Netlify link bilan kirish uchun
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Access-Control-Allow-Origin = "*"

# Cache static assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
